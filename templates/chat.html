<!DOCTYPE html>
<html>

<head>

<title>Siggy AI</title>

<style>

body{
background:#0f0f0f;
color:white;
font-family:Arial;
display:flex;
flex-direction:column;
align-items:center;
height:100vh;
margin:0;
}

h1{
margin-top:30px;
}

#chatbox{
width:600px;
height:400px;
overflow-y:auto;
border:1px solid #333;
padding:15px;
margin-top:20px;
border-radius:10px;
background:#1a1a1a;
}

.message{
margin-bottom:10px;
}

.user{
color:#00d9ff;
}

.bot{
color:#ffcc00;
}

#inputArea{
margin-top:15px;
display:flex;
width:600px;
}

input{
flex:1;
padding:10px;
border:none;
border-radius:5px;
}

button{
padding:10px 20px;
margin-left:10px;
background:#00d9ff;
border:none;
border-radius:5px;
cursor:pointer;
}

</style>

</head>

<body>

<h1>🐱 Siggy the Chaos Cat</h1>

<div id="chatbox"></div>

<div id="inputArea">
<input id="message" placeholder="Talk to Siggy..." />
<button onclick="send()">Send</button>
</div>

<script>

async function send(){

let input=document.getElementById("message")
let chatbox=document.getElementById("chatbox")

let msg=input.value

if(!msg) return

chatbox.innerHTML+=`<div class="message user"><b>You:</b> ${msg}</div>`

input.value=""

let res=await fetch("/chat",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({message:msg})
})

let data=await res.json()

chatbox.innerHTML+=`<div class="message bot"><b>Siggy:</b> ${data.reply}</div>`

chatbox.scrollTop=chatbox.scrollHeight

}

</script>

</body>
</html>
