<!DOCTYPE html>
<html>
<head>
<title>Siggy AI</title>

<style>

body{
background:#111;
color:white;
font-family:Arial;
display:flex;
flex-direction:column;
align-items:center;
}

h1{
margin-top:30px;
}

#chat{
width:600px;
margin-top:20px;
}

.message{
margin:10px 0;
padding:10px;
border-radius:8px;
}

.user{
background:#444;
text-align:right;
}

.bot{
background:#222;
}

#inputArea{
margin-top:20px;
display:flex;
}

input{
flex:1;
padding:10px;
border:none;
border-radius:6px;
}

button{
margin-left:10px;
padding:10px 20px;
background:#00c3ff;
border:none;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#0099cc;
}

</style>
</head>

<body>

<h1>🐱 Siggy AI</h1>

<div id="chat"></div>

<div id="inputArea">
<input id="msg" placeholder="Ask Siggy anything..." />
<button onclick="send()">Send</button>
</div>

<script>

async function send(){

const input = document.getElementById("msg")
const message = input.value

if(!message) return

const chat = document.getElementById("chat")

chat.innerHTML += `<div class="message user">${message}</div>`

input.value=""

const res = await fetch("/chat",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body:JSON.stringify({message})
})

const data = await res.json()

chat.innerHTML += `<div class="message bot">${data.reply}</div>`

chat.scrollTop = chat.scrollHeight

}

</script>

</body>
</html>
